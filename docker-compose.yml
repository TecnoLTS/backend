x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-storage-environment: &storage-environment
  STORAGE_DRIVER: ${STORAGE_DRIVER:-}
  REQUIRE_HA: ${REQUIRE_HA:-false}
  STORAGE_LOCAL_ARTIFACT_ROOT: /var/www/html/storage
  STORAGE_LOCAL_UPLOAD_ROOT: /var/www/html/public/uploads
  STORAGE_TEMP_ROOT: ${STORAGE_TEMP_ROOT:-/tmp/backend-object-storage}
  OBJECT_STORAGE_ENDPOINT: ${OBJECT_STORAGE_ENDPOINT:-}
  OBJECT_STORAGE_PUBLIC_BASE_URL: ${OBJECT_STORAGE_PUBLIC_BASE_URL:-}
  OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET:-}
  OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION:-us-east-1}
  OBJECT_STORAGE_ACCESS_KEY: ${OBJECT_STORAGE_ACCESS_KEY:-}
  OBJECT_STORAGE_ACCESS_KEY_FILE: ${OBJECT_STORAGE_ACCESS_KEY_FILE:-}
  OBJECT_STORAGE_SECRET_KEY: ${OBJECT_STORAGE_SECRET_KEY:-}
  OBJECT_STORAGE_SECRET_KEY_FILE: ${OBJECT_STORAGE_SECRET_KEY_FILE:-}
  OBJECT_STORAGE_SESSION_TOKEN: ${OBJECT_STORAGE_SESSION_TOKEN:-}
  OBJECT_STORAGE_SESSION_TOKEN_FILE: ${OBJECT_STORAGE_SESSION_TOKEN_FILE:-}
  OBJECT_STORAGE_PREFIX: ${OBJECT_STORAGE_PREFIX:-paramascotasec}
  OBJECT_STORAGE_PATH_STYLE: ${OBJECT_STORAGE_PATH_STYLE:-true}
  OBJECT_STORAGE_TLS_VERIFY: ${OBJECT_STORAGE_TLS_VERIFY:-true}
  OBJECT_STORAGE_TIMEOUT_SECONDS: ${OBJECT_STORAGE_TIMEOUT_SECONDS:-15}
  OBJECT_STORAGE_CANARY_ENABLED: ${OBJECT_STORAGE_CANARY_ENABLED:-false}

secrets:
  billing-secret-keyring:
    file: ${BILLING_SECRET_KEYRING_HOST_PATH:-./entorno/.secrets/billing-secret-keyring.json}
  commerce-billing-credentials:
    file: ${BILLING_OUTBOX_CREDENTIALS_HOST_PATH:-./entorno/.secrets/commerce-billing-credentials.json}

# Socket efimero compartido exclusivamente entre PHP-FPM y su Nginx interno.
# El volumen tmpfs evita inodes obsoletos en disco y fija ownership antes de
# que arranquen contenedores sin privilegios.
volumes:
  fpm-socket:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=1m,uid=82,gid=82,mode=0770

services:
  api:
    image: backend-api
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: backend-api
    restart: unless-stopped
    init: true
    stop_grace_period: ${BACKEND_API_STOP_GRACE_PERIOD:-30s}
    cpus: "${BACKEND_API_CPUS:-2.0}"
    mem_limit: "${BACKEND_API_MEMORY_LIMIT:-3g}"
    mem_reservation: "${BACKEND_API_MEMORY_RESERVATION:-768m}"
    pids_limit: ${BACKEND_API_PIDS_LIMIT:-256}
    logging: *default-logging
    user: "82:82"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    working_dir: /var/www/html
    command: >
      sh -c "umask 022
      && mkdir -p /var/www/html/public/uploads/products /var/www/html/public/uploads/loyalty/rewards
      && chmod 755 /var/www/html/public/uploads /var/www/html/public/uploads/products /var/www/html/public/uploads/loyalty /var/www/html/public/uploads/loyalty/rewards
      && exec /bin/sh /var/www/html/docker/start-php-fpm.sh"
    volumes:
      - ${BACKEND_STORAGE_PATH:-./storage}:/var/www/html/storage:rw
      - ${BACKEND_UPLOADS_PATH:-./public/uploads}:/var/www/html/public/uploads:rw
      - fpm-socket:/run/php-fpm:rw
    secrets:
      - source: billing-secret-keyring
        target: /run/secrets/backend/billing-secret-keyring.json
    tmpfs:
      - /tmp:size=64m,mode=1777
    environment:
      <<: *storage-environment
      TZ: America/Guayaquil
      DB_CONNECTION_ROLE: app
      DEFAULT_TENANT: ${DEFAULT_TENANT:-paramascotasec}
      PUBLIC_TENANT_SLUG: ${PUBLIC_TENANT_SLUG:-paramascotasec}
      PUBLIC_API_SERVICE_SEGMENT: ${PUBLIC_API_SERVICE_SEGMENT:-api}
