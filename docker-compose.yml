  http:
    image: nginxinc/nginx-unprivileged:1.31-alpine
    container_name: backend-http
    restart: unless-stopped
    init: true
    stop_grace_period: ${BACKEND_HTTP_STOP_GRACE_PERIOD:-20s}
    cpus: "${BACKEND_HTTP_CPUS:-0.75}"
    mem_limit: "${BACKEND_HTTP_MEMORY_LIMIT:-256m}"
    mem_reservation: "${BACKEND_HTTP_MEMORY_RESERVATION:-64m}"
    pids_limit: ${BACKEND_HTTP_PIDS_LIMIT:-128}
    logging: *default-logging
    user: "101:101"
    group_add:
      - "82"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      TZ: America/Guayaquil
    expose:
      - "8080"
    volumes:
      - ./public:/var/www/html/public:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - fpm-socket:/run/php-fpm:ro
    tmpfs:
      - /tmp:size=64m,mode=1777
      - /var/cache/nginx:size=32m,mode=755,uid=101,gid=101
      - /var/run:size=8m,mode=755,uid=101,gid=101
    healthcheck:
      # Docker supervisa proceso/ruteo con liveness liviano. La atestacion
      # profunda de DBs, registry, storage y secretos vive en /api/readyz y se
      # ejecuta de forma explicita por los controles operativos/scorecard.
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/internal/fpm-ping && wget -q -O /dev/null http://127.0.0.1:8080/api/livez || exit 1"]
      interval: ${BACKEND_HTTP_HEALTH_INTERVAL:-15s}
      timeout: ${BACKEND_HTTP_HEALTH_TIMEOUT:-5s}
      retries: ${BACKEND_HTTP_HEALTH_RETRIES:-12}
      start_period: ${BACKEND_HTTP_HEALTH_START_PERIOD:-30s}
    depends_on:
      - api
    networks:
      web_internal:
        aliases:
          - backend-http
      backend_internal:

networks:
  web_internal:
    external: true
    name: webparamascotas-internal
  backend_internal:
    internal: true
  db_internal:
    external: true
    name: basesdedatos-internal
  backend_egress:
    driver: bridge
