      test: ["CMD", "/bin/sh", "/var/www/html/docker/check-periodic-worker-health.sh", "billing-recovery", "${BILLING_WORKER_HEALTH_GRACE_SECONDS:-900}"]
      interval: ${BILLING_WORKER_HEALTH_INTERVAL:-30s}
      timeout: ${BILLING_WORKER_HEALTH_TIMEOUT:-5s}
      retries: ${BILLING_WORKER_HEALTH_RETRIES:-3}
      start_period: ${BILLING_WORKER_HEALTH_START_PERIOD:-5m}
    depends_on:
      - api
    networks:
      db_internal:
      backend_egress:

  wallet-notify-worker:
    image: backend-api
    container_name: backend-wallet-notify-worker
    restart: unless-stopped
    init: true
    stop_grace_period: ${WALLET_WORKER_STOP_GRACE_PERIOD:-30s}
