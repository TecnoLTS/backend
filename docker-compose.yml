    container_name: backend-sri-worker
    restart: unless-stopped
    init: true
    stop_grace_period: ${BILLING_WORKER_STOP_GRACE_PERIOD:-30s}
    cpus: "${BILLING_WORKER_CPUS:-0.75}"
    mem_limit: "${BILLING_WORKER_MEMORY_LIMIT:-512m}"
    mem_reservation: "${BILLING_WORKER_MEMORY_RESERVATION:-128m}"
    pids_limit: ${BILLING_WORKER_PIDS_LIMIT:-96}
    logging: *default-logging
    user: "82:82"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    working_dir: /var/www/html
    command:
      - /bin/sh
      - /var/www/html/docker/periodic-worker.sh
      - billing-recovery
      - "${BILLING_RECOVERY_SWEEP_INTERVAL_SECONDS:-3600}"
      - php
      - /var/www/html/scripts/process_billing_recovery.php
      - "--limit=${BILLING_RECOVERY_SWEEP_BATCH_SIZE:-50}"
      - "--min-age-seconds=${BILLING_RECOVERY_SWEEP_MIN_AGE_SECONDS:-3600}"
