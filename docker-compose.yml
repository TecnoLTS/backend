      DASHBOARD_PLATFORM_ADMIN_DOMAINS: ${DASHBOARD_PLATFORM_ADMIN_DOMAINS:-tecnolts.com}
      FIDEPUNTOS_DEMO_ENABLED: ${FIDEPUNTOS_DEMO_ENABLED:-1}
