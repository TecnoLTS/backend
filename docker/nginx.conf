map $request_uri $privacy_safe_request_target {
    ~^(/api/(?:l/(?:w|c|r)|loyalty/v1/wallet/google)/)[^/?]+  $1[REDACTED];
    ~^([^?]*)                         $1;
    default                           /;
}

# Cache interno para lecturas publicas exactas. Las mutaciones y toda
# solicitud con identidad o query siguen siempre hasta PHP. El host efectivo,
# el host reenviado, Origin y la codificacion forman parte de la clave para no
# mezclar tenants, canales ni variantes CORS/compresion.
fastcgi_cache_path /tmp/nginx-catalog-cache levels=1:2 keys_zone=catalog_public:16m
                   inactive=5m max_size=256m use_temp_path=off;
map $request_method $catalog_cache_safe_method { default 0; GET 1; }
map $args $catalog_cache_safe_args { default 0; "" 1; }
map $http_authorization $catalog_cache_safe_authorization { default 0; "" 1; }
map $http_cookie $catalog_cache_safe_cookie { default 0; "" 1; }
map "$catalog_cache_safe_method$catalog_cache_safe_args$catalog_cache_safe_authorization$catalog_cache_safe_cookie" $catalog_cache_bypass {
    default 1;
    "1111" 0;
}

# El data plane usa un socket Unix compartido y una conexion FastCGI por
# request. Mantener conexiones FastCGI abiertas deja al worker FPM en
# "Reading headers" y permite que los pools por worker Nginx inmovilicen todo
# el pool PHP. El observador conserva su listener TCP separado, sin keepalive.
upstream php_observer {
    server backend-api:9001;
}

log_format privacy_safe '$remote_addr - $remote_user [$time_local] '
                        '"$request_method $privacy_safe_request_target $server_protocol" '
                        '$status $body_bytes_sent "-" "$http_user_agent" '
                        'request_id="$http_x_request_id" request_time="$request_time" '
                        'upstream_addr="$upstream_addr" upstream_status="$upstream_status" '
                        'upstream_response_time="$upstream_response_time"';

server {
    listen 8080;
    index index.php index.html;
    error_log  /dev/stderr warn;
    # No registra query strings, Referer ni tokens de portal/wallet.
    access_log /dev/stdout privacy_safe;
    root /var/www/html/public;
    resolver 127.0.0.11 valid=10s ipv6=off;
    server_tokens off;
    client_max_body_size 20m;
    autoindex off;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header Cross-Origin-Resource-Policy "same-site" always;
    add_header Origin-Agent-Cluster "?1" always;

    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~* /(composer\.(json|lock)|package(-lock)?\.json|yarn\.lock|pnpm-lock\.yaml|docker-compose\.ya?ml|Dockerfile|phpunit\.xml|readme(?:\.[a-z0-9]+)?|README(?:\.[A-Z0-9]+)?|nginx\.conf|\.env(?:\..*)?)$ {
        return 404;
    }

    location = /debug_uri.php {
        return 404;
    }

    location ^~ /uploads/ {
        autoindex off;
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, no-transform" always;
    }

    # Diagnostico local del pool PHP-FPM. Nunca se publica por APISIX: solo el
    # healthcheck ejecutado dentro de backend-http puede consultar estas rutas.
    location = /internal/fpm-ping {
        allow 127.0.0.1;
        deny all;
        access_log off;
        include fastcgi_params;
        fastcgi_pass unix:/run/php-fpm/app.sock;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
    }

    location = /internal/fpm-status {
        allow 127.0.0.1;
        deny all;
        access_log off;
        include fastcgi_params;
        # FPM expone un listener de estado independiente para que la sonda no
        # consuma ni haga cola en el socket de trafico de aplicacion.
        fastcgi_pass php_observer;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
    }

    location = /api/products {
        include fastcgi_params;
        fastcgi_pass unix:/run/php-fpm/app.sock;
        fastcgi_hide_header X-Powered-By;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_param HTTP_HOST $http_host;
        fastcgi_param HTTP_X_REAL_IP $http_x_real_ip;
        fastcgi_param HTTP_X_FORWARDED_FOR $http_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_HOST $http_x_forwarded_host;
        fastcgi_param HTTP_X_ORIGINAL_HOST $http_x_original_host;
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_param HTTP_X_REQUEST_ID $http_x_request_id;
        fastcgi_param HTTP_X_INTERNAL_PROXY_TOKEN $http_x_internal_proxy_token;
        fastcgi_param HTTP_X_AUTH_SURFACE $http_x_auth_surface;

        fastcgi_cache catalog_public;
        fastcgi_cache_methods GET;
        fastcgi_cache_key "$http_host|$http_x_forwarded_host|$http_x_original_host|$request_uri|$http_origin|$http_accept_encoding";
        fastcgi_cache_bypass $catalog_cache_bypass;
        fastcgi_no_cache $catalog_cache_bypass $upstream_http_set_cookie;
        fastcgi_cache_valid 200 15s;
        fastcgi_cache_lock on;
        fastcgi_cache_lock_timeout 5s;
        add_header X-Catalog-Cache $upstream_cache_status always;
    }

    # Lecturas publicas pequenas usadas durante SSR/hidratacion. APISIX aplica
    # primero rate-limit y capability; este cache interno solo evita repetir la
    # consulta PHP/DB despues de superar esos controles. El match es exacto y el
    # mismo bypass anonimo del catalogo excluye query, cookie y Authorization.
    # Shipping publica precio e impuesto: conserva una ventana fiscal estricta
    # de 15 segundos y nunca sirve una representacion stale.
    location = /api/settings/shipping {
        include fastcgi_params;
        fastcgi_pass unix:/run/php-fpm/app.sock;
        fastcgi_hide_header X-Powered-By;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_param HTTP_HOST $http_host;
        fastcgi_param HTTP_X_REAL_IP $http_x_real_ip;
        fastcgi_param HTTP_X_FORWARDED_FOR $http_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_HOST $http_x_forwarded_host;
        fastcgi_param HTTP_X_ORIGINAL_HOST $http_x_original_host;
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_param HTTP_X_REQUEST_ID $http_x_request_id;
        fastcgi_param HTTP_X_INTERNAL_PROXY_TOKEN $http_x_internal_proxy_token;
        fastcgi_param HTTP_X_AUTH_SURFACE $http_x_auth_surface;

        fastcgi_cache catalog_public;
        fastcgi_cache_methods GET;
        fastcgi_cache_key "$http_host|$http_x_forwarded_host|$http_x_original_host|$request_uri|$http_origin|$http_accept_encoding";
        fastcgi_cache_bypass $catalog_cache_bypass;
        fastcgi_no_cache $catalog_cache_bypass $upstream_http_set_cookie;
        fastcgi_cache_valid 200 15s;
        fastcgi_cache_lock on;
        fastcgi_cache_lock_timeout 5s;
        add_header X-Public-Read-Cache $upstream_cache_status always;
    }

    # Referencias visuales/de catalogo sin importes fiscales. Su ventana de 60
    # segundos y refresh en background eliminan el cache miss del camino p95.
    location ~ ^/api/settings/(?:brand-logos|product-categories|product-category-references)$ {
        include fastcgi_params;
        fastcgi_pass unix:/run/php-fpm/app.sock;
        fastcgi_hide_header X-Powered-By;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_param HTTP_HOST $http_host;
        fastcgi_param HTTP_X_REAL_IP $http_x_real_ip;
        fastcgi_param HTTP_X_FORWARDED_FOR $http_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_HOST $http_x_forwarded_host;
        fastcgi_param HTTP_X_ORIGINAL_HOST $http_x_original_host;
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_param HTTP_X_REQUEST_ID $http_x_request_id;
        fastcgi_param HTTP_X_INTERNAL_PROXY_TOKEN $http_x_internal_proxy_token;
        fastcgi_param HTTP_X_AUTH_SURFACE $http_x_auth_surface;

        fastcgi_cache catalog_public;
        fastcgi_cache_methods GET;
        fastcgi_cache_key "$http_host|$http_x_forwarded_host|$http_x_original_host|$request_uri|$http_origin|$http_accept_encoding";
        fastcgi_cache_bypass $catalog_cache_bypass;
        fastcgi_no_cache $catalog_cache_bypass $upstream_http_set_cookie;
        fastcgi_cache_valid 200 60s;
        fastcgi_cache_lock on;
        fastcgi_cache_lock_timeout 5s;
        fastcgi_cache_background_update on;
        fastcgi_cache_use_stale error timeout invalid_header updating http_500 http_503;
        add_header X-Public-Read-Cache $upstream_cache_status always;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:/run/php-fpm/app.sock;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param HTTP_HOST $http_host;
        # PHP only trusts these values when X-Internal-Proxy-Token validates.
        # Preserve the metadata already normalized by APISIX/dashboard instead
        # of replacing the client IP with this Nginx container address.
        fastcgi_param HTTP_X_REAL_IP $http_x_real_ip;
        fastcgi_param HTTP_X_FORWARDED_FOR $http_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_HOST $http_x_forwarded_host;
        fastcgi_param HTTP_X_ORIGINAL_HOST $http_x_original_host;
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_param HTTP_X_REQUEST_ID $http_x_request_id;
        fastcgi_param HTTP_X_INTERNAL_PROXY_TOKEN $http_x_internal_proxy_token;
        fastcgi_param HTTP_X_AUTH_SURFACE $http_x_auth_surface;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
        gzip_static on;
    }
}
